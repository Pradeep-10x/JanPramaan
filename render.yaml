services:
  - type: web
    name: janpramaan-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install --include=dev && npm run build && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # paste your Supabase connection string in the Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: RESIDENT_PHONE_SALT
        generateValue: true
      - key: PORT
        value: "10000"
      - key: UPLOAD_DIR
        value: ./uploads
      - key: NODE_TLS_REJECT_UNAUTHORIZED
        value: "0"
